services:
  postgres:
    image: postgres:16
    container_name: email-firewall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: email_firewall
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d email_firewall"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: email-firewall-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-pull:
    image: curlimages/curl:latest
    container_name: email-firewall-ollama-pull
    depends_on:
      ollama:
        condition: service_started
    command: >
      sh -c "echo 'Waiting for Ollama...' &&
      until curl -s http://ollama:11434/api/tags > /dev/null; do sleep 2; done &&
      echo 'Pulling ç...' &&
      curl -X POST http://ollama:11434/api/pull -H 'Content-Type: application/json' -d '{\"name\":\"qwen2.5:1.5b\"}' &&
      echo 'Model pull finished.'"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: email-firewall-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      ollama-pull:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/email_firewall
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL: qwen2.5:1.5b
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: email-firewall-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  ollama_data: